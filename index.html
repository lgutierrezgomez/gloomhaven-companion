<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gloomhaven Companion</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="title-row">
        <h1>Gloomhaven Companion</h1>
        <span class="edition">1st edition</span>
      </div>
      <div class="toolbar">
        <button id="btn-open-folder" class="btn primary">Open campaign folder</button>
        <button id="btn-new" class="btn">New campaign</button>
        <button id="btn-load" class="btn">Load file…</button>
        <button id="btn-export" class="btn">Export</button>
        <span id="folder-info" class="folder-info">(no folder)</span>
      </div>
      <nav class="tabs">
        <button class="tab active" data-tab="tree">Tree</button>
        <button class="tab" data-tab="record">Record</button>
        <button class="tab" data-tab="reference">Reference</button>
        <button class="tab" data-tab="deductions">Deductions</button>
      </nav>
      <div id="status" class="status"></div>
    </header>

    <main id="view"></main>

    <!-- knowledge base (generated) -->
    <script src="knowledge.js"></script>
    <!-- pure logic -->
    <script src="deductions.js"></script>
    <!-- view helpers + views -->
    <script src="views/_util.js"></script>
    <script src="views/tree.js"></script>
    <script src="views/record.js"></script>
    <script src="views/reference.js"></script>
    <script src="views/deductions.js"></script>
    <!-- controller (boots on DOMContentLoaded) -->
    <script src="app.js"></script>
  </body>
</html>
